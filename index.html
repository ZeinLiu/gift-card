<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎁 Gift Card Generator</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 60px;
    }

    /* ── Page title ── */
    h1 {
      color: #fff;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .subtitle {
      color: rgba(255,255,255,.82);
      font-size: 1rem;
      margin-bottom: 32px;
      text-align: center;
    }

    /* ── Form card ── */
    .form-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      padding: 36px 40px;
      width: 100%;
      max-width: 540px;
      margin-bottom: 36px;
    }
    .form-card h2 {
      font-size: 1.15rem;
      color: #444;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Input group ── */
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.8px solid #e0e0e0;
      border-radius: 12px;
      font-size: .97rem;
      color: #222;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafafa;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #764ba2;
      box-shadow: 0 0 0 3px rgba(118,75,162,.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 70px; }

    /* ── Row layout ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── Theme picker ── */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .theme-opt {
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      border: 2.5px solid transparent;
      font-size: .78rem;
      font-weight: 600;
      transition: border-color .15s, transform .15s;
      user-select: none;
    }
    .theme-opt:hover { transform: scale(1.04); }
    .theme-opt.selected { border-color: #764ba2; }
    .theme-opt .swatch {
      width: 36px; height: 36px; border-radius: 50%;
      margin: 0 auto 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }

    /* ── Generate button ── */
    .gen-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 6px 20px rgba(118,75,162,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .gen-btn:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
    .gen-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error {
      background: #fff0f0;
      color: #c0392b;
      border: 1.5px solid #f5c6c6;
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 14px;
      font-size: .9rem;
      display: none;
    }

    /* ═══════════════════════════════════════
       GIFT CARD OUTPUT SECTION
    ═══════════════════════════════════════ */
    #card-section { display: none; width: 100%; max-width: 680px; }
    #card-section > h2 {
      color: #fff;
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 18px;
      text-shadow: 0 2px 6px rgba(0,0,0,.2);
    }

    /* Outer envelope / glow border */
    .envelope {
      position: relative;
      border-radius: 28px;
      padding: 5px;
      box-shadow: 0 30px 80px rgba(0,0,0,.3);
      overflow: hidden;
      transition: background .5s ease;
    }

    /* Inner card */
    .gift-card {
      border-radius: 24px;
      min-height: 460px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background .5s ease;
    }

    /* Decorative circles */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      opacity: .15;
      pointer-events: none;
    }

    /* ── Photo banner ── */
    .card-photo {
      width: 100%;
      height: 200px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    /* canvas = instant placeholder, always underneath */
    .card-photo canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    /* real photo fades in on top once loaded */
    .card-photo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .6s ease;
    }
    .card-photo img.loaded { opacity: 1; }
    /* gradient overlay so tag/ribbon text is readable */
    .card-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.06) 0%, rgba(0,0,0,.52) 100%);
      pointer-events: none;
    }
    /* tag + ribbon overlaid on banner */
    .photo-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 20px 14px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      z-index: 2;
      color: #fff;
    }
    .photo-overlay .tag {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    .photo-overlay .ribbon {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .8px;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }

    /* Card body */
    .card-body {
      flex: 1;
      padding: 22px 32px 24px;
      position: relative;
      z-index: 1;
    }
    .card-body .recipient-name {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .card-body .message {
      font-size: 1rem;
      line-height: 1.75;
      font-style: italic;
      opacity: .92;
    }
    .card-body .emoji-strip {
      margin-top: 18px;
      font-size: 1.5rem;
      letter-spacing: 4px;
    }

    /* Card footer */
    .card-footer {
      padding: 16px 32px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      border-top: 1.5px solid rgba(255,255,255,.18);
    }
    .card-footer .from-label { font-size: .82rem; opacity: .65; font-weight: 600; }
    .card-footer .relationship-badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.2);
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .4px;
    }

    /* ── Colour palette panel ── */
    .palette-panel {
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 18px 20px;
      margin-top: 18px;
    }
    .palette-panel .palette-label {
      color: rgba(255,255,255,.8);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-align: center;
    }
    .palette-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .pal-swatch {
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .18s, border-color .18s, box-shadow .18s;
      position: relative;
      flex-shrink: 0;
    }
    .pal-swatch:hover { transform: scale(1.18); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .pal-swatch.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,.5), 0 4px 14px rgba(0,0,0,.3);
      transform: scale(1.12);
    }
    .pal-swatch .swatch-tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      color: #fff;
      font-size: .68rem;
      font-weight: 600;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 6px;
      pointer-events: none;
    }
    .pal-swatch:hover .swatch-tip { display: block; }

    /* ── Action buttons ── */
    .card-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }
    .act-btn {
      flex: 1;
      max-width: 200px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: .93rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .act-btn:hover { opacity: .88; transform: translateY(-1px); }
    .act-btn.print { background: #fff; color: #764ba2; }
    .act-btn.again { background: rgba(255,255,255,.15); color: #fff; border: 2px solid rgba(255,255,255,.4); }

    /* ── THEME DEFAULTS (envelope + card bg) ── */
    .theme-birthday .envelope  { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .theme-birthday .gift-card { background: linear-gradient(145deg, #ff6b6b, #feca57, #ff9f43); color: #fff; }
    .theme-birthday .deco-circle.c1 { width:280px; height:280px; background:#fff;    bottom:-60px; right:-60px; }
    .theme-birthday .deco-circle.c2 { width:140px; height:140px; background:#ffd200; bottom:-40px; left:-30px; }

    .theme-romance .envelope   { background: linear-gradient(135deg, #f953c6, #b91d73); }
    .theme-romance .gift-card  { background: linear-gradient(145deg, #e91e63, #c2185b, #880e4f); color: #fff; }
    .theme-romance .deco-circle.c1 { width:300px; height:300px; background:#f48fb1; bottom:-80px; right:-70px; }
    .theme-romance .deco-circle.c2 { width:140px; height:140px; background:#ad1457; bottom:-40px; left:-30px; }

    .theme-friendship .envelope  { background: linear-gradient(135deg, #00c6ff, #0072ff); }
    .theme-friendship .gift-card { background: linear-gradient(145deg, #4facfe, #00f2fe, #43e97b); color: #fff; }
    .theme-friendship .deco-circle.c1 { width:260px; height:260px; background:#fff;    bottom:-60px; right:-50px; }
    .theme-friendship .deco-circle.c2 { width:150px; height:150px; background:#00c6ff; bottom:-40px; left:-30px; }

    .theme-celebration .envelope  { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
    .theme-celebration .gift-card { background: linear-gradient(145deg, #6a3093, #a044ff, #e96c6c); color: #fff; }
    .theme-celebration .deco-circle.c1 { width:270px; height:270px; background:rgba(255,255,255,.25); bottom:-70px; right:-60px; }
    .theme-celebration .deco-circle.c2 { width:130px; height:130px; background:#a044ff; bottom:-40px; left:-20px; }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      top: -20px;
      opacity: 0;
      animation: fall linear forwards;
      border-radius: 2px;
      pointer-events: none;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Print ── */
    @media print {
      body { background: none !important; padding: 0; }
      .form-card, #card-section > h2, .card-actions, .palette-panel, h1, .subtitle { display: none !important; }
      #card-section { display: block !important; max-width: 100%; }
      .envelope { box-shadow: none; }
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .form-card { padding: 24px 20px; }
      .two-col { grid-template-columns: 1fr; }
      .theme-grid { grid-template-columns: repeat(2, 1fr); }
      .card-photo { height: 150px; }
      .card-body { padding: 16px 20px 20px; }
      .card-footer { padding: 12px 20px 20px; }
      .card-body .recipient-name { font-size: 1.6rem; }
      .pal-swatch { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>

<h1>🎁 Gift Card Generator</h1>
<p class="subtitle">Warm, funny & unforgettable — personalised in seconds ✨</p>

<!-- ══ FORM ══ -->
<div class="form-card">
  <h2>🪄 Card Details</h2>

  <div class="two-col">
    <div class="field">
      <label>Recipient's Name</label>
      <input type="text" id="name" placeholder="e.g. Sarah" />
    </div>
    <div class="field">
      <label>Your Name (Sender)</label>
      <input type="text" id="senderName" placeholder="e.g. Alex" />
    </div>
  </div>

  <div class="two-col">
    <div class="field">
      <label>Birthday / Age</label>
      <input type="text" id="birthday" placeholder="e.g. turning 30" />
    </div>
    <div class="field">
      <label>Hobby or Interest</label>
      <input type="text" id="hobby" placeholder="e.g. hiking, gaming" />
    </div>
  </div>

  <div class="field">
    <label>Your Relationship</label>
    <select id="relationship">
      <option value="best friend">Best Friend</option>
      <option value="friend">Friend</option>
      <option value="partner / significant other">Partner / SO</option>
      <option value="mom">Mom</option>
      <option value="dad">Dad</option>
      <option value="sibling">Sibling</option>
      <option value="colleague">Colleague</option>
      <option value="boss">Boss</option>
      <option value="mentor">Mentor</option>
      <option value="secret santa recipient">Secret Santa</option>
    </select>
  </div>

  <div class="field">
    <label>Anything extra? <span style="font-weight:400;text-transform:none;color:#aaa">(optional)</span></label>
    <textarea id="extra" placeholder="e.g. She just got promoted, loves cats, terrible taste in movies…"></textarea>
  </div>

  <div class="field">
    <label>Card Theme</label>
    <div class="theme-grid">
      <div class="theme-opt selected" data-theme="birthday" onclick="selectTheme(this)">
        <div class="swatch" style="background:linear-gradient(135deg,#ff6b6b,#feca57)">🎂</div>Birthday
      </div>
      <div class="theme-opt" data-theme="romance" onclick="selectTheme(this)">
        <div class="swatch" style="background:linear-gradient(135deg,#e91e63,#880e4f)">💖</div>Romance
      </div>
      <div class="theme-opt" data-theme="friendship" onclick="selectTheme(this)">
        <div class="swatch" style="background:linear-gradient(135deg,#4facfe,#43e97b)">🤝</div>Friendship
      </div>
      <div class="theme-opt" data-theme="celebration" onclick="selectTheme(this)">
        <div class="swatch" style="background:linear-gradient(135deg,#6a3093,#e96c6c)">🎉</div>Celebration
      </div>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">
    <span>🎁 Create My Card</span>
  </button>
  <div class="error" id="errorMsg"></div>
</div>

<!-- ══ CARD OUTPUT ══ -->
<div id="card-section">
  <h2>Your personalised gift card is ready! 🎊</h2>

  <div class="envelope" id="envelope">
    <div class="gift-card" id="giftCard">
      <div class="deco-circle c1"></div>
      <div class="deco-circle c2"></div>

      <!-- Photo banner: canvas placeholder + real Unsplash photo on top -->
      <div class="card-photo" id="cardPhoto">
        <canvas id="bannerCanvas"></canvas>
        <img id="bannerImg" src="" alt="" />
        <div class="photo-overlay">
          <span class="tag"  id="cardTag">Happy Birthday</span>
          <span class="ribbon" id="cardRibbon">✦ Special Day ✦</span>
        </div>
      </div>

      <!-- Body -->
      <div class="card-body">
        <div class="recipient-name" id="cardName">Sarah</div>
        <div class="message"        id="cardMessage"></div>
        <div class="emoji-strip"    id="cardEmojiStrip"></div>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        <span class="from-label" id="cardFromLabel">with love from your</span>
        <span class="relationship-badge" id="cardRelationship">best friend</span>
      </div>
    </div>
  </div>

  <!-- ── Colour palette ── -->
  <div class="palette-panel">
    <div class="palette-label">🎨 Change Card Colour</div>
    <div class="palette-swatches" id="palettSwatches"></div>
  </div>

  <div class="card-actions">
    <button class="act-btn print" onclick="window.print()">🖨️ Print Card</button>
    <button class="act-btn again" onclick="scrollToForm()">🔄 Make Another</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let selectedTheme   = 'birthday';
let customGradient  = null;   // null → use theme default

// ════════════════════════════════════════
//  THEME META
// ════════════════════════════════════════
const THEME_META = {
  birthday:    { tag: '🎂 Happy Birthday',   ribbon: '✦ Special Day ✦',      emojis: '🎂🎈🥳🎁✨🎊🎉' },
  romance:     { tag: '💖 With Love',         ribbon: '✦ Always & Forever ✦', emojis: '💕🌹😍💌🥂✨💋' },
  friendship:  { tag: '🤝 For My Friend',     ribbon: '✦ Friends Forever ✦',  emojis: '🤝🌟😂🫶🎉🙌💙' },
  celebration: { tag: '🎉 Congratulations',  ribbon: '✦ You Did It! ✦',      emojis: '🏆🎊🥂✨🌟🎈🎉' },
};

// ════════════════════════════════════════
//  COLOUR PALETTE  (envelope bg + card bg)
// ════════════════════════════════════════
const PALETTES = [
  { name: 'Sunset',    env: 'linear-gradient(135deg,#f7971e,#ffd200)',    card: 'linear-gradient(145deg,#ff6b6b,#feca57,#ff9f43)' },
  { name: 'Cherry',    env: 'linear-gradient(135deg,#eb3349,#f45c43)',    card: 'linear-gradient(145deg,#c0392b,#eb3349,#f45c43)' },
  { name: 'Rose',      env: 'linear-gradient(135deg,#f953c6,#b91d73)',    card: 'linear-gradient(145deg,#e91e63,#c2185b,#880e4f)' },
  { name: 'Lavender',  env: 'linear-gradient(135deg,#a18cd1,#fbc2eb)',    card: 'linear-gradient(145deg,#7b2ff7,#a044ff,#d48cf7)' },
  { name: 'Twilight',  env: 'linear-gradient(135deg,#667eea,#764ba2)',    card: 'linear-gradient(145deg,#4a00e0,#667eea,#8e2de2)' },
  { name: 'Ocean',     env: 'linear-gradient(135deg,#00c6ff,#0072ff)',    card: 'linear-gradient(145deg,#4facfe,#00c6ff,#0072ff)' },
  { name: 'Aurora',    env: 'linear-gradient(135deg,#43e97b,#38f9d7)',    card: 'linear-gradient(145deg,#11998e,#43e97b,#38f9d7)' },
  { name: 'Emerald',   env: 'linear-gradient(135deg,#134e5e,#71b280)',    card: 'linear-gradient(145deg,#0f3443,#134e5e,#71b280)' },
  { name: 'Gold',      env: 'linear-gradient(135deg,#f7971e,#c6a84b)',    card: 'linear-gradient(145deg,#8B6914,#c6a84b,#f7ce68)' },
  { name: 'Night',     env: 'linear-gradient(135deg,#232526,#414345)',    card: 'linear-gradient(145deg,#0f0c29,#302b63,#24243e)' },
  { name: 'Flamingo',  env: 'linear-gradient(135deg,#f64f59,#c471ed)',    card: 'linear-gradient(145deg,#c471ed,#f64f59,#12c2e9)' },
  { name: 'Peach',     env: 'linear-gradient(135deg,#ffb347,#ffcc33)',    card: 'linear-gradient(145deg,#f09819,#ffb347,#edde5d)' },
];

// ════════════════════════════════════════
//  CANVAS BANNER  — no external requests
// ════════════════════════════════════════

// Theme colour stops for the banner gradient
const BANNER_COLORS = {
  birthday:    ['#ff6b6b','#feca57','#ff9f43'],
  romance:     ['#e91e63','#ad1457','#f48fb1'],
  friendship:  ['#4facfe','#00f2fe','#43e97b'],
  celebration: ['#6a3093','#a044ff','#e96c6c'],
};

// Central big emoji + scatter emojis per hobby
const HOBBY_ART = [
  { re: /\b(hik|trek|trail|mount|outdoor|camping)/i,            main:'🏔️', deco:['🌲','🌿','⛰️','🦅','🌄'] },
  { re: /\b(game|gaming|gamer|esport|video\s*game)/i,           main:'🎮', deco:['🕹️','⚡','🌟','💎','🎯'] },
  { re: /\b(read|book|novel|literat|bibliophile)/i,             main:'📚', deco:['✨','🔖','📖','🪄','☕'] },
  { re: /\b(cook|bak|chef|food|kitchen|recipe)/i,               main:'🍳', deco:['🧁','🥘','🌶️','🫕','🍰'] },
  { re: /\b(run|jog|marathon|sprint|triathlo)/i,                main:'🏃', deco:['⚡','💨','🏅','👟','🌬️'] },
  { re: /\b(yoga|medit|mindful|pilates|zen)/i,                  main:'🧘', deco:['🌸','✨','🌙','💫','🕊️'] },
  { re: /\b(art|paint|draw|sketch|illustrat|craft)/i,           main:'🎨', deco:['✏️','🖌️','🌈','⭐','🖼️'] },
  { re: /\b(music|guitar|piano|sing|drum|band|instrument)/i,   main:'🎵', deco:['🎸','🎹','🎶','🎤','🎺'] },
  { re: /\b(photo|camera|lens|shoot|portrait)/i,               main:'📷', deco:['🌟','🖼️','✨','🎞️','🔭'] },
  { re: /\b(travel|wander|explore|adventure)/i,                 main:'✈️', deco:['🗺️','🌍','🧭','🌅','🏖️'] },
  { re: /\b(film|movie|cinema|series)/i,                       main:'🎬', deco:['🍿','⭐','🎞️','🌟','🎭'] },
  { re: /\b(sport|footbal|soccer|basket|tennis|swim|cycl|bike)/i,main:'🏆',deco:['⚽','🏅','💪','🌟','🥇'] },
  { re: /\b(garden|plant|flower|grow|botany)/i,                main:'🌸', deco:['🌿','🦋','🌻','🌱','🍀'] },
  { re: /\b(dance|danc)/i,                                     main:'💃', deco:['🎶','✨','🌟','🪩','💫'] },
  { re: /\b(writ|blog|journal|poet|author)/i,                  main:'✍️', deco:['📝','💡','📜','🖋️','🌟'] },
];

const THEME_ART = {
  birthday:    { main:'🎂', deco:['🎈','🥳','🎁','✨','🎊','🎉','🌟'] },
  romance:     { main:'💕', deco:['🌹','😍','💌','✨','🥂','💋','🌸'] },
  friendship:  { main:'🤝', deco:['🌟','😂','🫶','🎉','🙌','💙','✨'] },
  celebration: { main:'🏆', deco:['🎊','🥂','✨','🌟','🎈','🎉','💫'] },
};

function getArt(hobby, theme) {
  if (hobby) {
    const h = hobby.toLowerCase();
    for (const row of HOBBY_ART) {
      if (row.re.test(h)) return row;
    }
  }
  return THEME_ART[theme] || THEME_ART.celebration;
}

function drawBanner(hobby, theme) {
  const canvas = document.getElementById('bannerCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 800, H = 200;
  canvas.width  = W;
  canvas.height = H;

  // ── 1. Gradient background ──
  const cols = BANNER_COLORS[theme] || BANNER_COLORS.celebration;
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0,   cols[0]);
  grad.addColorStop(0.55, cols[1]);
  grad.addColorStop(1,   cols[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ── 2. Soft bokeh circles ──
  const bokeh = [
    {x:.08, y:.5,  r:110, a:.13}, {x:.87, y:.18, r:140, a:.10},
    {x:.55, y:.9,  r: 85, a:.14}, {x:.28, y:-.15,r: 95, a:.10},
    {x:1.05,y:.7,  r:115, a:.09}, {x:.42, y:.5,  r: 60, a:.07},
    {x:.72, y:.15, r: 70, a:.08},
  ];
  bokeh.forEach(b => {
    const rg = ctx.createRadialGradient(b.x*W, b.y*H, 0, b.x*W, b.y*H, b.r);
    rg.addColorStop(0, `rgba(255,255,255,${b.a*1.8})`);
    rg.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(b.x*W, b.y*H, b.r, 0, Math.PI*2);
    ctx.fill();
  });

  // ── 3. Wavy shimmer line ──
  ctx.beginPath();
  ctx.moveTo(0, H*0.6);
  for (let x = 0; x <= W; x += 4) {
    const y = H*0.6 + Math.sin(x/60)*18 + Math.sin(x/30)*8;
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 28;
  ctx.stroke();

  // ── 4. Scattered deco emojis ──
  const art = getArt(hobby, theme);
  const positions = [
    [65,38],[700,28],[750,150],[55,162],[175,168],
    [640,165],[355,22],[455,172],[280,30],[560,45],
  ];
  ctx.font = '22px serif';
  ctx.globalAlpha = 0.38;
  positions.forEach((pos, i) => {
    ctx.fillText(art.deco[i % art.deco.length], pos[0], pos[1]);
  });
  ctx.globalAlpha = 1;

  // ── 5. Central main emoji with glow ──
  ctx.shadowColor   = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur    = 18;
  ctx.shadowOffsetY = 5;
  ctx.font          = '82px serif';
  ctx.textAlign     = 'center';
  ctx.textBaseline  = 'middle';
  ctx.fillText(art.main, W/2, H/2 - 2);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;
}

// ════════════════════════════════════════
//  BUILD PALETTE SWATCHES (once on load)
// ════════════════════════════════════════
(function buildPalette() {
  const container = document.getElementById('palettSwatches');
  PALETTES.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'pal-swatch' + (i === 0 ? ' active' : '');
    el.style.background = p.env;
    el.title = p.name;
    el.innerHTML = `<span class="swatch-tip">${p.name}</span>`;
    el.addEventListener('click', () => applyPalette(i, el));
    container.appendChild(el);
  });
})();

function applyPalette(idx, el) {
  document.querySelectorAll('.pal-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  const p = PALETTES[idx];
  const envelope = document.getElementById('envelope');
  const giftCard = document.getElementById('giftCard');

  // remove theme classes so inline style takes over
  ['birthday','romance','friendship','celebration'].forEach(t => {
    envelope.classList.remove(`theme-${t}`);
    giftCard.classList.remove(`theme-${t}`);
  });
  envelope.style.background = p.env;
  giftCard.style.background  = p.card;
  customGradient = p;
}

// ════════════════════════════════════════
//  THEME SELECTOR
// ════════════════════════════════════════
function selectTheme(el) {
  document.querySelectorAll('.theme-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedTheme = el.dataset.theme;
}

// ════════════════════════════════════════
//  GENERATE
// ════════════════════════════════════════
function generate() {
  const name         = document.getElementById('name').value.trim();
  const senderName   = document.getElementById('senderName').value.trim();
  const birthday     = document.getElementById('birthday').value.trim();
  const hobby        = document.getElementById('hobby').value.trim();
  const relationship = document.getElementById('relationship').value;
  const extra        = document.getElementById('extra').value.trim();

  if (!name) return showError('Please enter the recipient\'s name.');
  hideError();
  setLoading(true);

  setTimeout(() => {
    try {
      const message = buildMessage({ name, birthday, hobby, relationship, extra, theme: selectedTheme });
      renderCard(message, { name, senderName, hobby, relationship });
      confetti();
    } catch(e) {
      showError('Oops — something went wrong. Please try again.');
    } finally {
      setLoading(false);
    }
  }, 320);
}

// ════════════════════════════════════════
//  RENDER CARD
// ════════════════════════════════════════
function renderCard(message, { name, senderName, hobby, relationship }) {
  const meta = THEME_META[selectedTheme];

  // Apply theme class (reset any inline palette override first)
  const envelope = document.getElementById('envelope');
  const giftCard = document.getElementById('giftCard');
  envelope.style.background = '';
  giftCard.style.background = '';
  ['birthday','romance','friendship','celebration'].forEach(t => {
    envelope.classList.remove(`theme-${t}`);
    giftCard.classList.remove(`theme-${t}`);
  });
  envelope.classList.add(`theme-${selectedTheme}`);
  giftCard.classList.add(`theme-${selectedTheme}`);

  // Re-select first palette swatch as "active" visual reset
  document.querySelectorAll('.pal-swatch').forEach(s => s.classList.remove('active'));
  customGradient = null;

  // Fill text content
  document.getElementById('cardTag').textContent          = meta.tag;
  document.getElementById('cardRibbon').textContent       = meta.ribbon;
  document.getElementById('cardName').textContent         = name;
  document.getElementById('cardMessage').textContent      = message;
  document.getElementById('cardEmojiStrip').textContent   = meta.emojis;
  document.getElementById('cardRelationship').textContent = relationship;
  document.getElementById('cardFromLabel').textContent    = senderName ? `with love, ${senderName} —` : 'with love from your';

  // Draw canvas instantly, then try to load real Unsplash photo on top
  drawBanner(hobby, selectedTheme);
  loadBannerPhoto(hobby, selectedTheme);

  // Show section
  const section = document.getElementById('card-section');
  section.style.display = 'block';
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
}


// ════════════════════════════════════════
//  REAL PHOTO  (Unsplash Source, HTTPS only)
//  Canvas stays visible as instant fallback.
// ════════════════════════════════════════
const HOBBY_KEYWORDS = [
  { re: /\b(hik|trek|trail|mount|outdoor|camping)/i,           kw: 'mountain,hiking,landscape' },
  { re: /\b(game|gaming|gamer|esport|video\s*game)/i,          kw: 'gaming,neon,technology' },
  { re: /\b(read|book|novel|literat|bibliophile)/i,            kw: 'books,library,reading' },
  { re: /\b(cook|bak|chef|food|kitchen|recipe)/i,              kw: 'food,cooking,kitchen' },
  { re: /\b(run|jog|marathon|sprint|triathlo)/i,               kw: 'running,sport,athlete' },
  { re: /\b(yoga|medit|mindful|pilates|zen)/i,                 kw: 'yoga,meditation,peaceful' },
  { re: /\b(art|paint|draw|sketch|illustrat|craft)/i,          kw: 'art,painting,creative' },
  { re: /\b(music|guitar|piano|sing|drum|band|instrument)/i,  kw: 'music,concert,guitar' },
  { re: /\b(photo|camera|lens|shoot|portrait)/i,              kw: 'photography,camera,portrait' },
  { re: /\b(travel|wander|explore|adventure)/i,                kw: 'travel,adventure,landscape' },
  { re: /\b(film|movie|cinema|series)/i,                      kw: 'cinema,film,popcorn' },
  { re: /\b(sport|footbal|soccer|basket|tennis|swim|cycl|bike)/i, kw: 'sport,stadium,athlete' },
  { re: /\b(garden|plant|flower|grow|botany)/i,               kw: 'garden,flowers,nature' },
  { re: /\b(dance|danc)/i,                                    kw: 'dance,performance,movement' },
  { re: /\b(writ|blog|journal|poet|author)/i,                 kw: 'writing,journal,books' },
];
const THEME_KEYWORDS = {
  birthday:    'birthday,celebration,balloons',
  romance:     'roses,romance,love',
  friendship:  'friends,happy,laughing',
  celebration: 'celebration,confetti,party',
};

function getBannerKeyword(hobby, theme) {
  if (hobby) {
    const h = hobby.toLowerCase();
    for (const { re, kw } of HOBBY_KEYWORDS) {
      if (re.test(h)) return kw;
    }
    // use raw hobby text as keyword if no match
    return encodeURIComponent(hobby.split(/[\s,]+/)[0]);
  }
  return THEME_KEYWORDS[theme] || 'celebration';
}

function loadBannerPhoto(hobby, theme) {
  const img = document.getElementById('bannerImg');
  img.classList.remove('loaded');
  img.src = '';

  const keyword = getBannerKeyword(hobby, theme);
  // Unsplash Source returns a redirect to a real, relevant photo
  const url = `https://source.unsplash.com/800x250/?${keyword}`;

  const tmp = new Image();
  tmp.onload = () => {
    img.src = tmp.src;          // use the resolved URL after redirect
    img.classList.add('loaded');
  };
  tmp.onerror = () => {
    img.classList.remove('loaded'); // canvas stays visible as fallback
  };
  tmp.src = url;
}

// ════════════════════════════════════════
//  MESSAGE BUILDER
// ════════════════════════════════════════
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildMessage({ name, birthday, hobby, relationship, extra, theme }) {
  const h  = hobby   ? hobby.toLowerCase()   : null;
  const bd = birthday || null;
  const ex = extra   || null;

  const hobbyLines = h ? buildHobbyLine(h) : pick([
    `You make every ordinary day feel like a celebration just by being in it.`,
    `The world is a better, funnier, warmer place because you're in it.`,
  ]);

  const ageLines = bd ? pick([
    `${bd} — officially the age where you're too wise to care and too fabulous to stop. 🎉`,
    `${bd}?! Honestly you wear it better than anyone has a right to.`,
    `Hitting ${bd} and still this iconic? Truly unfair to the rest of us.`,
    `${bd} looks incredible on you — mostly because everything does.`,
  ]) : null;

  const openers = {
    'best friend':                 pick([`Of all the people I could've gotten stuck with as a best friend,`, `You are hands-down the best bad-decision partner I've ever had,`]),
    'friend':                      pick([`Having a friend like you is basically winning a personality lottery,`, `They say good friends are hard to find —`]),
    'partner / significant other': pick([`Every cheesy love song makes a little more sense because of you,`, `Out of every human on this planet,`]),
    'mom':                         pick([`No one in history has loved harder, worried more, or given better unsolicited advice than you,`, `You somehow managed to raise a functional human being —`]),
    'dad':                         pick([`You are the reason I know how to parallel park and pretend to be an adult,`, `The dad jokes, the wisdom, the emergency snacks —`]),
    'sibling':                     pick([`We didn't choose each other, but I'd pick you every single time,`, `Of all the siblings I could have ended up with,`]),
    'colleague':                   pick([`Working next to you has been the highlight of every otherwise-ordinary workday,`, `You make even the most chaotic Monday feel survivable,`]),
    'boss':                        pick([`Great leaders are rare. Great leaders who are also decent humans? Even rarer.`, `You've turned management into an art form —`]),
    'mentor':                      pick([`Everything I know about doing this right, I learned from watching you,`, `Having a mentor like you is like getting a cheat code for life —`]),
    'secret santa recipient':      pick([`We may not know each other that well, but I hope this card changes that,`, `Secret Santa told me very little about you — so I went with vibes,`]),
  };

  const closers = {
    birthday:    pick([`Wishing you a birthday as spectacular as you are — which means absolutely legendary.`, `Here's to you, to this day, and to all the chaos still ahead. 🥂`, `Happy birthday — now go celebrate in a way that will make a great story later!`]),
    romance:     pick([`I love you more than words, but words will have to do for now. 💕`, `Here's to us, to this, and to every good thing still coming our way.`, `You're my favourite person, and I'll keep telling you that forever.`]),
    friendship:  pick([`Lucky doesn't begin to cover it — I hit the jackpot with you. 🌟`, `Thanks for being exactly who you are. Don't ever change (except maybe the alarm volume). 😂`, `Here's to you — and to us, and to every ridiculous adventure still ahead.`]),
    celebration: pick([`You worked so hard for this — now enjoy every single second of it! 🏆`, `This is your moment. Own it, savour it, and let us all celebrate you properly. 🎉`, `The hard part is done. The celebration part? That's all you. Go wild! 🥂`]),
  };

  const opener = openers[relationship] || pick([`You are one of the good ones,`, `Celebrating you feels like the most natural thing in the world,`]);
  const closer = closers[theme];
  const extraLine = ex ? pick([
    `And honestly, ${ex.trim().toLowerCase()} — that just makes all of this even better.`,
    `Also worth noting: ${ex.trim().toLowerCase()}. Which tells you everything about how remarkable ${name} is.`,
  ]) : null;

  const parts = [opener + ' ' + hobbyLines];
  if (ageLines)   parts.push(ageLines);
  if (extraLine)  parts.push(extraLine);
  parts.push(closer);
  return parts.join(' ');
}

function buildHobbyLine(h) {
  const matchers = [
    [/\b(hik|trek|trail|mount|outdoor|camping)/i,    pick([`The fact that you willingly go outside and uphill for fun says everything wonderful and slightly unhinged about you.`, `You've turned "let's go outside" into a whole personality — and honestly it works.`])],
    [/\b(game|gaming|gamer|esport|video\s*game)/i,   pick([`Your gaming skills are honestly terrifying — which is why I'm glad we're on the same team in life.`, `You put as much strategy into real life as you do into gaming, which explains why you're winning at both.`])],
    [/\b(read|book|novel|literat|bibliophile)/i,     pick([`You've read more books than most people have hot takes, and you're wiser for every single one.`, `Your book collection is either a library or a cry for help — either way, it's impressive.`])],
    [/\b(cook|bak|chef|food|kitchen|recipe)/i,       pick([`You've turned cooking into an art form, which means the rest of us just show up hungry and grateful.`, `Your kitchen skills are the reason I have zero excuses to eat badly anymore.`])],
    [/\b(run|jog|marathon|sprint|triathlo)/i,        pick([`You run for fun, which is either heroic or a cry for help — I've decided it's heroic.`, `The dedication it takes to be a runner is the same dedication you bring to everything — relentless and a little sweaty.`])],
    [/\b(yoga|medit|mindful|pilates|zen)/i,          pick([`Your zen energy is genuinely contagious — being around you makes the world feel 40% calmer.`, `You've found inner peace, and the rest of us are just trying to keep up.`])],
    [/\b(art|paint|draw|sketch|illustrat|craft)/i,   pick([`You see the world differently from the rest of us — and then you make it beautiful enough for us to see it too.`, `Your creativity is the kind that makes people stop and genuinely stare.`])],
    [/\b(music|guitar|piano|sing|drum|band)/i,       pick([`You make music the way some people breathe — effortlessly and like the world would be worse without it.`, `The talent you have for music is matched only by your talent for being one of the best humans around.`])],
    [/\b(photo|camera|lens|shoot|portrait)/i,        pick([`You have an eye for beauty that most people spend a lifetime trying to develop — and you make it look easy.`, `Your photography is proof that you see the world in a way the rest of us are lucky to borrow.`])],
    [/\b(travel|wander|explore|adventure)/i,          pick([`Your passport has seen more of this world than most people ever will — and it shows in how wonderfully curious you are.`, `You treat every new place like a gift, which is exactly how you treat every new person too.`])],
    [/\b(film|movie|cinema|series)/i,                pick([`Your taste in films is impeccable — and your running commentary makes everything at least 30% better.`, `You've watched more films than most people have had hot meals, and every recommendation has been spot-on.`])],
    [/\b(sport|footbal|soccer|basket|tennis|swim|cycl|bike)/i, pick([`The passion you bring to sport is the same passion you bring to everything — full throttle, no brakes.`, `You're the kind of competitor who makes everyone around you better, on and off the field.`])],
    [/\b(garden|plant|flower|grow|botany)/i,         pick([`You've turned patience and dirt into something beautiful — which is pretty much your superpower in life too.`, `Your green thumb is matched only by your warm heart — everything you touch seems to grow.`])],
    [/\b(dance|danc)/i,                              pick([`You move through life with the same joy and rhythm you bring to the dance floor — it's wonderful to witness.`, `You dance like nobody's watching, which is why everyone always is.`])],
    [/\b(writ|blog|journal|poet|author)/i,           pick([`You have a way with words that makes the rest of us feel like we've been using them all wrong.`, `You write with the kind of honesty and warmth that stays with people long after they've finished reading.`])],
  ];
  for (const [re, line] of matchers) { if (re.test(h)) return line; }
  return pick([
    `Your passion for ${h} is the kind of enthusiasm that makes everyone around you want to try it too.`,
    `The way you throw yourself into ${h} is exactly how you approach everything — with curiosity and full commitment.`,
  ]);
}

// ════════════════════════════════════════
//  CONFETTI
// ════════════════════════════════════════
function confetti() {
  const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#ff9f43'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${(Math.random()*2+1.5).toFixed(2)}s;
      animation-delay:${(Math.random()*1.3).toFixed(2)}s;
      width:${(Math.random()*8+6).toFixed(0)}px;
      height:${(Math.random()*10+8).toFixed(0)}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4800);
  }
}

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function setLoading(on) {
  const btn = document.getElementById('genBtn');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<div class="spinner"></div><span>Crafting your card…</span>'
    : '<span>🎁 Create My Card</span>';
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
function scrollToForm() { document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' }); }
</script>
